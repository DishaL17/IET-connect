<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Campus Connect</title>
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="setting.css">
    <style>
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            text-align: left;
        }
        .form-label {
            font-weight: 700;
            color: var(--text);
            font-size: 15px;
        }
        .form-input {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
            width: 100%;
        }
        .form-input:focus {
            border-color: var(--teal-1);
            background: var(--bottom-line);
        }
        .btn-submit {
            width: 100%;
            background: var(--background);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(47, 126, 120, 0.15);
            margin-top: 10px;
        }
        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 16px rgba(47, 126, 120, 0.25);
        }
        .pwd-strength {
            font-size: 12px;
            font-weight: 700;
            margin-top: -12px;
            margin-bottom: 15px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <div class="settings-header">
            <h1 class="settings-title"><i class="fi fi-rr-lock"></i> Change Password</h1>
            <a href="setthing.html" class="home-link">← Settings</a>
        </div>

        <form id="changePasswordForm">
            <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-input" id="currentPassword" placeholder="Enter current password" required>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 25px 0 20px;">

            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" id="newPassword" placeholder="Minimum 6 characters" required oninput="checkStrength(this.value)">
            </div>
            <div class="pwd-strength" id="strengthLabel" style="display: none;"></div>

            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" class="form-input" id="confirmPassword" placeholder="Re-enter new password" required>
            </div>

            <button type="submit" class="btn-submit">Update Password</button>
        </form>
    </div>

    <script src="common.js"></script>
    <script>
        const userId = localStorage.getItem("userId");
        const token = localStorage.getItem("token");

        document.addEventListener("DOMContentLoaded", () => {
            if (!userId) {
                window.location.href = "loginpage.html";
                return;
            }
        });

        function checkStrength(val) {
            const label = document.getElementById("strengthLabel");
            if (!val) {
                label.style.display = "none";
                return;
            }
            label.style.display = "block";
            if (val.length < 6) {
                label.textContent = "Strength: Too short";
                label.style.color = "#b40b0b";
            } else if (val.match(/([a-zA-Z])/) && val.match(/([0-9])/) && val.match(/([!,%,&,@,#,$,^,*,?,_,~])/)) {
                label.textContent = "Strength: Strong 💪";
                label.style.color = "#1b8843";
            } else {
                label.textContent = "Strength: Medium (Add numbers/special chars)";
                label.style.color = "#a26b2d";
            }
        }

        document.getElementById("changePasswordForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const currentPassword = document.getElementById("currentPassword").value;
            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (newPassword.length < 6) {
                alert("New password must be at least 6 characters long.");
                return;
            }

            if (newPassword !== confirmPassword) {
                alert("Confirm password does not match new password.");
                return;
            }

            try {
                const res = await fetch(`http://localhost:5000/api/profile/${userId}/change-password`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ currentPassword, newPassword })
                });

                if (res.ok) {
                    const data = await res.json();
                    alert(data.message || "Password updated successfully!");
                    document.getElementById("changePasswordForm").reset();
                    document.getElementById("strengthLabel").style.display = "none";
                } else {
                    const err = await res.json();
                    alert(err.error || "Failed to update password.");
                }
            } catch (err) {
                console.error("Change password submit error:", err);
                alert("An error occurred. Make sure server is running.");
            }
        });
    </script>
</body>
</html>
