<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Nunito',sans-serif;
}

body{
    background:#f6f8fb;
    min-height:100vh;
    padding:40px 20px;
}

.club-container{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:24px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.club-header{
    margin-bottom:30px;
    border-bottom:1px solid #e5e7eb;
    padding-bottom:20px;
}

#clubName{
    color:#2f7e78;
    font-size:36px;
    font-weight:800;
    margin-bottom:8px;
}

.club-subtitle{
    color:#64748b;
    font-size:15px;
}

.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:30px;
}

.info-card{
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:16px;
    padding:18px;
}

.info-card h3{
    color:#2f7e78;
    font-size:16px;
    margin-bottom:10px;
}

.info-card p{
    color:#475569;
    line-height:1.6;
}

.section{
    margin-bottom:25px;
}

.section h2{
    color:#1e293b;
    margin-bottom:10px;
    font-size:20px;
}

.section p{
    color:#475569;
    line-height:1.8;
}



.back-btn{
    display:inline-block;
    margin-bottom:25px;
    text-decoration:none;
    color:#2f7e78;
    font-weight:700;
}

.back-btn:hover{
    text-decoration:underline;
}

@media(max-width:768px){

    .info-grid{
        grid-template-columns:1fr;
    }

    #clubName{
        font-size:28px;
    }

    .club-container{
        padding:25px;
    }
}
</style>
<body>

<div class="club-container">

    <a href="Announcment.html" class="back-btn">
        ← Back to Clubs
    </a>

    <div class="club-header">
        <h1 id="clubName"></h1>
        <p class="club-subtitle">
            Campus Club Information
        </p>
    </div>

    <div class="info-grid">

        <div class="info-card">
            <h3>Club Head</h3>
            <p id="headName"></p>
        </div>

        <div class="info-card">
            <h3>Founded Year</h3>
            <p id="foundedYear"></p>
        </div>

    </div>

    <div class="section">
        <h2>Description</h2>
        <p id="description"></p>
    </div>

    <div class="section">
        <h2>Current Projects</h2>
        <p id="currentProjects"></p>
    </div>

    <div class="section">
        <h2>Future Scope</h2>
        <p id="futureScope"></p>
    </div>


</div>

<script src="club.js"></script>
</body>
</html>
