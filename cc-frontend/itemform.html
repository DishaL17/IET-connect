<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report / List Item - Campus Connect</title>
    <!-- Nunito Font for consistent branding -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="itemform.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">
                <div class="logo-icon">🎓</div>
                <span>Campus Connect</span>
            </div>
            <a href="home.html" class="back-btn" id="backBtn">← Home</a>
        </div>

        <h2 id="formTitle">List an Item</h2>

        <form id="itemForm">
            <!-- 1. Type selection -->
            <div class="form-group">
                <label for="itemType">What would you like to do?</label>
                <select id="itemType" required>
                    <option value="lost">Report Lost Item 🔦</option>
                    <option value="found">Report Found Item 🤝</option>
                    <option value="sell">Sell an Item 📦</option>
                    <option value="rent">List a Rental 🔑</option>
                </select>
            </div>

            <!-- 2. Title -->
            <div class="form-group">
                <label for="itemTitle" id="labelTitle">Item Name</label>
                <input type="text" id="itemTitle" placeholder="e.g. iPhone 13, Casio Calculator" required />
            </div>

            <!-- 3. Category -->
            <div class="form-group">
                <label for="itemCategory">Category</label>
                <select id="itemCategory" required>
                    <option value="Other">Other</option>
                    <option value="Phone">Phone</option>
                    <option value="Keys">Keys</option>
                    <option value="Wallet">Wallet</option>
                    <option value="Card">Card / ID Card</option>
                    <option value="Document">Document / Notes</option>
                    <option value="Book">Textbook</option>
                    <option value="Calculator">Calculator</option>
                </select>
            </div>

            <!-- 4. Location / Contact Info -->
            <div class="form-group" class="location">
                <label for="itemLocation" id="labelLocation">Last Seen Location</label>
                <input type="text" id="itemLocation" placeholder="e.g. Library 3rd Floor, Canteen" required />
            </div>

            <!-- 5. Price (conditional) -->
            <div class="form-group price-field-wrapper" id="priceFieldWrapper">
                <label for="itemPrice" id="labelPrice">Price / Rental Fee</label>
                <input type="text" id="itemPrice" placeholder="e.g. ₹500, Free, ₹50/day" />
            </div>

            <!-- 6. Description -->
            <div class="form-group">
                <label for="itemDescription">Description / Details</label>
                <textarea id="itemDescription" placeholder="Add any descriptive details (color, brand, distinguishing marks, condition)..."></textarea>
            </div>

            <!-- 7. Image URL -->
            <div class="form-group">
                <label for="itemImageUrl">Image URL (Optional)</label>
                <input type="text" id="itemImageUrl" placeholder="e.g. https://example.com/item.jpg" />
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit Listing</button>
        </form>

        <div id="formMessage" class="message"></div>
    </div>
<script src="darktheme.js"></script>
    <script src="itemform.js"></script>
</body>
</html>
