<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - Campus Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="setting.css">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        .rating-summary {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            border-radius: 14px;
            background: var(--bottom-line);
            margin-bottom: 25px;
            border: 1px dashed var(--teal-1);
        }
        .rating-number {
            font-size: 48px;
            font-weight: 800;
            color: var(--teal-1);
        }
        .rating-stars {
            font-size: 24px;
            color: #fbbf24;
            margin-bottom: 5px;
        }
        .rating-label {
            font-size: 13px;
            color: var(--muted);
        }
        .review-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .review-card {
            padding: 16px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            background: var(--white);
            text-align: left;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .reviewer-name {
            font-weight: 700;
            color: var(--text);
            font-size: 15px;
        }
        .review-stars {
            color: #fbbf24;
            font-size: 14px;
        }
        .review-text {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.4;
        }
        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }
        .settings-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--teal-1);
            margin: 0;
        }
        .back-link {
            text-decoration: none;
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            background: var(--white);
        }
        .back-link:hover {
            color: var(--teal-1);
            border-color: var(--teal-1);
            background: var(--bottom-line);
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <div class="settings-header">
            <h1 class="settings-title">⭐ Reviews</h1>
            <a href="setthing.html" class="back-link">← Settings</a>
        </div>
        
        <div style="display: flex; justify-content: flex-end; margin-bottom: 15px;">
            <button id="openReviewModalBtn" style="padding: 10px 16px; background: var(--teal-1); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all 0.2s;">+ Write a Review</button>
        </div>

        <div class="rating-summary">
            <div>
                <div class="rating-number" id="ratingAvg">0.0</div>
                <div class="rating-stars" id="ratingStars">☆☆☆☆☆</div>
                <div class="rating-label" id="ratingCount">based on 0 reviews</div>
            </div>
            <div style="font-size: 14px; color: var(--text); text-align: left;">
                <div id="ratingPositive">👍 0% Positive Feedback</div>
                <div>⚡ Average response: 15 mins</div>
                <div>🤝 Verified Student Seller</div>
            </div>
        </div>

        <div class="review-list" id="reviewList">
            <!-- Dynamically populated reviews -->
            <div style="text-align: center; padding: 40px; color: var(--muted);">Loading reviews...</div>
        </div>
    </div>

    <!-- Write a Review Modal -->
    <div id="reviewModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; font-family: 'Nunito', sans-serif;">
        <div class="modal-content" style="background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: left; box-sizing: border-box; margin: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
                <h3 style="margin: 0; font-size: 20px; color: var(--teal-1); font-weight: 800;">⭐ Write a Review</h3>
                <button id="closeReviewModalBtn" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted);">&times;</button>
            </div>
            
            <form id="reviewForm">
                <div class="form-group" style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px;">
                    <label for="reviewRecipient" style="font-weight: 700; font-size: 14px; color: var(--text);">Select Student</label>
                    <select id="reviewRecipient" required style="padding: 12px; border-radius: 10px; border: 1.5px solid var(--border); outline: none;">
                        <option value="">Choose a campus member...</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px;">
                    <label for="reviewRating" style="font-weight: 700; font-size: 14px; color: var(--text);">Rating</label>
                    <select id="reviewRating" required style="padding: 12px; border-radius: 10px; border: 1.5px solid var(--border); outline: none;">
                        <option value="5">★★★★★ (5 Stars)</option>
                        <option value="4">★★★★☆ (4 Stars)</option>
                        <option value="3">★★★☆☆ (3 Stars)</option>
                        <option value="2">★★☆☆☆ (2 Stars)</option>
                        <option value="1">★☆☆☆☆ (1 Star)</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px;">
                    <label for="reviewText" style="font-weight: 700; font-size: 14px; color: var(--text);">Review Comment</label>
                    <textarea id="reviewText" required placeholder="Tell others about your trade experience..." style="padding: 12px; border-radius: 10px; border: 1.5px solid var(--border); outline: none; min-height: 100px; resize: vertical; font-family: inherit; width: 100%; box-sizing: border-box;"></textarea>
                </div>

                <button type="submit" class="submit-btn" style="width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--teal-2), var(--teal-1)); color: white; font-weight: 700; cursor: pointer; transition: all 0.2s;">Submit Review</button>
            </form>
        </div>
    </div>
    
    <script src="common.js"></script>
    <script src="reviews.js"></script>
</body>
</html>
