<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loginpage</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
   <div class="login-box">
      <div class="logo-container">
          <div class="logo-icon"><img src="iet_connect_icon.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;"></div>
          <div class="logo-text">IET Connect</div>
      </div>
      <div class="wb">Create Account !</div>
      <h2>Register</h2>

    <form id="registerform">
      <div class="input-box"  >
        <input type="text" id="name" placeholder="Enter name" required> 
      </div>
      <div class="input-box"  >
        <input type="email" id="email" placeholder="Enter Email" required>
      </div>

      <div class="input-box" >
        <input type="password" id="password" placeholder="Create Password" required>
        <i class="fa-solid fa-eye" id="eye"></i>
      </div>

      <div class="input-box" >
        <input type="password" id="Confirmpassword" placeholder="Confirm Password" required>
        <i class="fa-solid fa-eye" id="eye"></i>
      </div>

      <button type="button" class="btn" id="registerbtn" >Register</button>

      <div class="extra">
        Already have an account?
        <a href="loginpage.html">Login</a>
      </div>
      <div style="margin-top: 25px; font-size: 11px; text-align: center; color: var(--muted); border-top: 1px solid #cbd5e1; padding-top: 12px; opacity: 0.85;">
        © 2026 IET Connect. All rights reserved.
      </div>
      <script src="register.js"></script>
  
</body>
</html>
