<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loginpage</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

   <div class="login-box">
      <div class="logo-container">
          <div class="logo-icon"><img src="login-logo.png" alt="Logo"></div>
          <div class="logo-text">IET Connect</div>
      </div>
      <div class="wb">Welcome Back !</div>
      <h2>Login</h2>

    <form>
      <div class="input-box">
      <input type="email" id="email" placeholder="Enter Email" required>
      </div>

      <div class="input-box">
        <input type="password" id="password" placeholder="Enter Password" required>
        <i class="fa-solid fa-eye" id="eye"></i>
      </div>

      <button type="button" class="btn" id="loginbtn"  >Login</button>

      <div class="extra">
        Don't have an account?
        <a href="register.html">Register</a>
      </div>
      <div class="extra" style="margin-top: 10px;">
        <a href="forgot-password.html" style="font-size: 13px; font-weight: 600; text-decoration: none; color: #4aa39c;">Forgot Password?</a>
      </div>
      <div style="margin-top: 25px; font-size: 11px; text-align: center; color: var(--muted); border-top: 1px solid #cbd5e1; padding-top: 12px; opacity: 0.85;">
        © 2026 IET Connect. All rights reserved.
      </div>
      <script src="common.js"></script>
      <script src="login.js"></script>
      
</body>
</html>
