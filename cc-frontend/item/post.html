<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Poppins
:ital,wght@0,400;0,500;0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="post.css">
    <link rel="stylesheet" href="../dash.css">
</head>
<body>
    <nav class="sidebar"  id="sidebar">
  <img src="../sidelogo.png" alt="IET Connect Logo">

 <div class="nav-links">
    
    <a href="../home/home.html" class="nav-link "><i class="fi fi-rr-home"></i> Home</a>
    <a href="post.html" class="nav-link active"><i class="fi fi-rr-edit"></i> My Post</a>
    <a href="../announcement/Announcment.html" class="nav-link"><i class="fi fi-rr-megaphone"></i> Announcements</a>
       <a href="../message/notification.html" class="nav-link"><i class="fi fi-rr-comment-dots"></i> Messages </a>
        <a href="../setting/setthing.html" class="nav-link"><i class="fi fi-rr-settings"></i> Settings</a>
  </div>
  <div class="sidebar-footer">
    <span>© 2026 IET Connect<br>All rights reserved.</span>
  </div>
  </nav>
 
   <!-- Topbar -->
  <header class="topbar">
    <div class="search-bar">
      <div class="search-box">
        <i class="fi fi-rr-search"></i>
        <input type="text" id="sea"
          placeholder="Search for lost, rent, sell items…"
          oninput="searchItems()"
          onkeydown="if(event.key==='Enter') searchItems()">
      </div>
      <button onclick="searchItems()">Search</button>
    </div>
    <div class="user-chip">
      <div class="avatar"></div>
      <span class="username"></span>
    </div>

    <!-- Search Dropdown -->
    <div class="search-drop" id="searchDrop" style="display:none">
      <ul id="result"></ul>
    </div>
  </header>

 <main class="main">
    
     <div class="con">
       <div class="head"> <span class="ti">From lost treasures to great deals—find all your posts here.</span>
       <span class="li">Manage all your Buy, Sell, Lost & Found posts in one place.</span></div>
       
       <!-- Tab Toggle for Club Admins / Admins -->
       <div id="postsTabContainer" class="tabs-container" style="display: none; margin-bottom: 25px; gap: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
         <button id="tabListings" class="tab-btn active" onclick="switchTab('listings')">My Listings</button>
         <button id="tabAnnouncements" class="tab-btn" onclick="switchTab('announcements')">Club Announcements</button>
       </div>
       
       <div class="itm"></div>
     </div>
  </main>

  <!-- Edit Announcement Modal -->
  <div id="editAnnouncementModal" class="modal">
    <div class="modal-content" style="position: relative;">
      <span class="close-btn" onclick="closeEditAnnouncementModal()">&times;</span>
      <div class="modal-body">
        <h2 style="margin-bottom: 20px; color: var(--teal-dark); font-weight: 800;">Edit Announcement</h2>
        <form id="editAnnouncementForm" onsubmit="submitEditAnnouncement(event)">
          <input type="hidden" id="editAnnId">
          
          <div style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px;">
            <label style="font-weight: 700; font-size: 14px; color: var(--text);">Announcement Title</label>
            <input type="text" id="editAnnTitle" style="padding: 10px; border: 1.5px solid var(--border); border-radius: 10px; outline: none; font-family: inherit; font-size: 14.5px; width: 100%; box-sizing: border-box;" required>
          </div>
          
          <div style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px;">
            <label style="font-weight: 700; font-size: 14px; color: var(--text);">Venue</label>
            <input type="text" id="editAnnVenue" style="padding: 10px; border: 1.5px solid var(--border); border-radius: 10px; outline: none; font-family: inherit; font-size: 14.5px; width: 100%; box-sizing: border-box;" required>
          </div>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
            <div style="display: flex; flex-direction: column; gap: 6px;">
              <label style="font-weight: 700; font-size: 14px; color: var(--text);">Date</label>
              <input type="date" id="editAnnDate" style="padding: 10px; border: 1.5px solid var(--border); border-radius: 10px; outline: none; font-family: inherit; font-size: 14.5px; width: 100%; box-sizing: border-box;" required>
            </div>
            <div style="display: flex; flex-direction: column; gap: 6px;">
              <label style="font-weight: 700; font-size: 14px; color: var(--text);">Time</label>
              <input type="text" id="editAnnTime" style="padding: 10px; border: 1.5px solid var(--border); border-radius: 10px; outline: none; font-family: inherit; font-size: 14.5px; width: 100%; box-sizing: border-box;" placeholder="e.g. 5:00 PM" required>
            </div>
          </div>
          
          <div style="margin-bottom: 20px; display: flex; flex-direction: column; gap: 6px;">
            <label style="font-weight: 700; font-size: 14px; color: var(--text);">Description</label>
            <textarea id="editAnnDesc" style="padding: 10px; border: 1.5px solid var(--border); border-radius: 10px; outline: none; font-family: inherit; font-size: 14.5px; min-height: 100px; resize: vertical; width: 100%; box-sizing: border-box;" required></textarea>
          </div>
          
          <div style="display: flex; gap: 10px;">
            <button type="submit" style="flex: 1; padding: 12px; font-size: 14px; font-weight: 700; color: white; background: var(--teal); border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s;">Save Changes</button>
            <button type="button" onclick="closeEditAnnouncementModal()" style="padding: 12px 20px; font-size: 14px; font-weight: 700; color: var(--muted); background: #f1f5f9; border: none; border-radius: 10px; cursor: pointer;">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>
<script src="post.js"></script>
<script src="../common.js"></script>

</body>
</html>
