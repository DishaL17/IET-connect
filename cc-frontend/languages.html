<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Language - Campus Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="setting.css">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        .lang-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }
        .lang-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            background: var(--white);
        }
        .lang-card:hover {
            border-color: var(--teal-1);
            background: var(--bottom-line);
        }
        .lang-card.selected {
            border-color: var(--teal-1);
            background: var(--bottom-line);
            box-shadow: 0 4px 12px rgba(47, 126, 120, 0.1);
        }
        .lang-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .lang-flag {
            font-size: 24px;
        }
        .lang-names {
            text-align: left;
        }
        .lang-name {
            font-weight: 700;
            color: var(--text);
            font-size: 16px;
        }
        .lang-native {
            font-size: 13px;
            color: var(--muted);
        }
        .checkmark {
            font-size: 18px;
            color: var(--teal-1);
            font-weight: 800;
            display: none;
        }
        .lang-card.selected .checkmark {
            display: block;
        }
        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }
        .settings-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--teal-1);
            margin: 0;
        }
        .back-link {
            text-decoration: none;
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            background: var(--white);
        }
        .back-link:hover {
            color: var(--teal-1);
            border-color: var(--teal-1);
            background: var(--bottom-line);
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <div class="settings-header">
            <h1 class="settings-title">🌐 Select Language</h1>
            <a href="setthing.html" class="back-link">← Settings</a>
        </div>

        <div class="lang-options">
            <div class="lang-card selected" onclick="selectLang(this, 'English')">
                <div class="lang-info">
                    <span class="lang-flag">🇬🇧</span>
                    <div class="lang-names">
                        <div class="lang-name">English</div>
                        <div class="lang-native">English</div>
                    </div>
                </div>
                <span class="checkmark">✓</span>
            </div>

            <div class="lang-card" onclick="selectLang(this, 'Hindi')">
                <div class="lang-info">
                    <span class="lang-flag">🇮🇳</span>
                    <div class="lang-names">
                        <div class="lang-name">Hindi</div>
                        <div class="lang-native">हिन्दी</div>
                    </div>
                </div>
                <span class="checkmark">✓</span>
            </div>

            <div class="lang-card" onclick="selectLang(this, 'Spanish')">
                <div class="lang-info">
                    <span class="lang-flag">🇪🇸</span>
                    <div class="lang-names">
                        <div class="lang-name">Spanish</div>
                        <div class="lang-native">Español</div>
                    </div>
                </div>
                <span class="checkmark">✓</span>
            </div>

            <div class="lang-card" onclick="selectLang(this, 'French')">
                <div class="lang-info">
                    <span class="lang-flag">🇫🇷</span>
                    <div class="lang-names">
                        <div class="lang-name">French</div>
                        <div class="lang-native">Français</div>
                    </div>
                </div>
                <span class="checkmark">✓</span>
            </div>

            <div class="lang-card" onclick="selectLang(this, 'German')">
                <div class="lang-info">
                    <span class="lang-flag">🇩🇪</span>
                    <div class="lang-names">
                        <div class="lang-name">German</div>
                        <div class="lang-native">Deutsch</div>
                    </div>
                </div>
                <span class="checkmark">✓</span>
            </div>
        </div>
    </div>

    <script>
        function selectLang(element, lang) {
            document.querySelectorAll('.lang-card').forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
            setTimeout(() => {
                alert(`Language changed to ${lang}!`);
                window.location.href = 'setthing.html';
            }, 300);
        }
    </script>

    <!-- Navigation Bar at Bottom -->
    <div class="nav-links">
        <a href="home.html" class="nav-link"><span>🏠</span> Home</a>
        <a href="post.html" class="nav-link"><span>📋</span> My Post</a>
        <a href="Announcment.html" class="nav-link"><span>📢</span> Announcements</a>
        <a href="notification.html" class="nav-link"><span>🔔</span> Notifications <em class="badge">3</em></a>
        <a href="setthing.html" class="nav-link active"><span>⚙️</span> Settings</a>
    </div>
    <script src="darktheme.js"></script>
</body>
</html>
