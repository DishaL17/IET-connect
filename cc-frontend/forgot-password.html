<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - IET Connect</title>
    <link rel="stylesheet" href="login.css">
    <script src="common.js"></script>
    <style>
        .step-desc {
            font-size: 14px;
            color: #64748b;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .back-to-login {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #2f7e78;
            text-decoration: none;
            font-weight: 700;
        }
        .back-to-login:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-container">
            <div class="logo-icon"><img src="iet_connect_icon.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;"></div>
            <div class="logo-text">IET Connect</div>
        </div>
        <h2 id="pageTitle">Forgot Password</h2>

        <!-- Step 1: Email Form -->
        <form id="emailForm">
            <div class="step-desc">
                Enter your registered college email address and we will simulate sending a 4-digit verification code.
            </div>
            <div class="input-box">
                <input type="email" id="email" placeholder="Enter Registered Email" required>
            </div>
            <button type="submit" class="btn" id="sendBtn">Send Verification Code</button>
            <a href="loginpage.html" class="back-to-login">← Back to Login</a>
        </form>

        <!-- Step 2: Code & Reset Form (Hidden by default) -->
        <form id="resetForm" style="display: none;">
            <div class="step-desc" style="color: #1b8843; font-weight: 600;">
                Simulation: 4-digit code sent! (Use test code: 1234)
            </div>
            <div class="input-box">
                <input type="text" id="verificationCode" placeholder="Enter 4-digit Code (e.g. 1234)" required>
            </div>
            <div class="input-box">
                <input type="password" id="newPassword" placeholder="Enter New Password" required>
            </div>
            <div class="input-box">
                <input type="password" id="confirmNewPassword" placeholder="Confirm New Password" required>
            </div>
            <button type="submit" class="btn">Reset Password</button>
            <a href="#" onclick="showStep(1); return false;" class="back-to-login">← Back</a>
        </form>
    </div>

    <script>
        let currentEmail = "";

        function showStep(step) {
            const emailForm = document.getElementById("emailForm");
            const resetForm = document.getElementById("resetForm");
            const pageTitle = document.getElementById("pageTitle");

            if (step === 1) {
                emailForm.style.display = "block";
                resetForm.style.display = "none";
                pageTitle.textContent = "Forgot Password";
            } else if (step === 2) {
                emailForm.style.display = "none";
                resetForm.style.display = "block";
                pageTitle.textContent = "Reset Password";
            }
        }

        document.getElementById("emailForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            const sendBtn = document.getElementById("sendBtn");

            sendBtn.disabled = true;
            sendBtn.textContent = "Verifying...";

            try {
                const res = await fetch(window.API_BASE_URL + "/api/forgot-password/verify-email", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();
                if (res.ok && data.success) {
                    currentEmail = email;
                    alert("Verification email verified (simulation). Code sent!");
                    showStep(2);
                } else {
                    alert(data.message || "Email address not registered.");
                }
            } catch (err) {
                console.error("Verify email error:", err);
                alert("Error connecting to server. Make sure backend is running.");
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "Send Verification Code";
            }
        });

        document.getElementById("resetForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const code = document.getElementById("verificationCode").value.trim();
            const newPassword = document.getElementById("newPassword").value;
            const confirmNewPassword = document.getElementById("confirmNewPassword").value;

            if (code !== "1234") {
                alert("Incorrect verification code. Please use simulated code: 1234");
                return;
            }

            if (newPassword.length < 6) {
                alert("New password must be at least 6 characters long.");
                return;
            }

            if (newPassword !== confirmNewPassword) {
                alert("Passwords do not match.");
                return;
            }

            try {
                const res = await fetch(window.API_BASE_URL + "/api/forgot-password/reset", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: currentEmail, code, newPassword })
                });

                const data = await res.json();
                if (res.ok && data.success) {
                    alert("Password reset successfully! Please login with your new password.");
                    window.location.href = "loginpage.html";
                } else {
                    alert(data.message || "Failed to reset password.");
                }
            } catch (err) {
                console.error("Reset password error:", err);
                alert("Error resetting password.");
            }
        });
    </script>
</body>
</html>
