<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Campus Connect</title>
    <!-- Google Fonts Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="setting.css">
    
</head>
<body>
    <div class="settings-container">
        <!-- Settings Top Header -->
        <div class="settings-header">
            <h1 class="settings-title">⚙️ Settings</h1>
            <a href="home.html" class="home-link">← Home</a>
        </div>

        <!-- Profile Card -->
        <div class="user-chip" style="margin-bottom: 25px;">
            <div class="avatar">DL</div>
            <div>
                <div class="username">Disha Lowanshi</div>
                <div class="user-email">disha.l@college.edu</div>
            </div>
        </div>

        <!-- Section 1: Account Settings -->
        <div class="set">
            <div class="k">Account Settings</div>
            
            <div class="acc" onclick="window.location.href='edit-profile.html'" style="cursor: pointer;">
                <span class="h"><span class="icon">👤</span> Edit Profile</span>
                <button class="a">&gt;</button>
            </div>
            
            <div class="acc" onclick="window.location.href='languages.html'" style="cursor: pointer;">
                <span class="h"><span class="icon">🌐</span> Select Languages</span>
                <button class="a">&gt;</button>
            </div>
            
            <div class="acc" onclick="window.location.href='notification.html'" style="cursor: pointer;">
                <span class="h"><span class="icon">🔔</span> Notification Settings</span>
                <button class="a">&gt;</button>
            </div>
            
            <div class="acc" onclick="window.location.href='loginpage.html'" style="cursor: pointer; color: #b40b0b;">
                <span class="h" style="color: #b40b0b;"><span class="icon">🚪</span> Logout</span>
                <button class="a" style="color: #b40b0b;">&gt;</button>
            </div>
        </div>
        
        <!-- Section 2: My Activity -->
        <div class="set">
            <div class="k">My Activity</div>
            
            <div class="acc" id="theme-toggle" style="cursor: pointer;">
    <span class="h">
        <span class="icon" id="theme-icon">🌙</span> Theme
    </span>
    <button class="a">&gt;</button>
</div>
            
            <div class="acc" onclick="window.location.href='reviews.html'" style="cursor: pointer;">
                <span class="h"><span class="icon">⭐</span> Reviews</span>
                <button class="a">&gt;</button>
            </div>
            
            <div class="acc" onclick="window.location.href='qa.html'" style="cursor: pointer;">
                <span class="h"><span class="icon">💬</span> Questions & Answers</span>
                <button class="a">&gt;</button>
            </div>
        </div>
        
        <!-- Section 3: Feedback & Info -->
        <div class="set">
            <div class="k">Feedback & Information</div>
            
            <div class="acc" onclick="window.location.href='about.html'" style="cursor: pointer;">
                <span class="h"><span class="icon">ℹ️</span> About Us</span>
                <button class="a">&gt;</button>
            </div>
            
            <div class="acc" onclick="window.location.href='feedback.html'" style="cursor: pointer;">
                <span class="h"><span class="icon">📝</span> Feedback</span>
                <button class="a">&gt;</button>
            </div>
        </div>
    </div>

    <script src="darktheme.js"></script>
</body>
</html>
