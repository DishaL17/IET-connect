<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Announcement</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Nunito',sans-serif;
}

body{
    background:#f8fafc;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
    margin-bottom:20px;
    color:#2f7e78;
}

.form-group{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:18px;
}

label{
    font-weight:700;
}

input{
    padding:12px;
    border:1px solid #dbe2ea;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2f7e78;
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#message{
    margin-top:15px;
    text-align:center;
    font-weight:700;
}
</style>
</head>
<body>

<div class="container">

    <h1>📢 Create Announcement</h1>

    <form id="announcementForm">

        <div class="form-group">
            <label>Club Name</label>
            <input
                type="text"
                id="clubName"
                placeholder="e.g. E-Cell"
                required>
        </div>

        <div class="form-group">
            <label>Announcement Title</label>
            <input
                type="text"
                id="title"
                placeholder="e.g. Speaker Session"
                required>
        </div>

        <div class="form-group">
            <label>Venue</label>
            <input
                type="text"
                id="venue"
                placeholder="e.g. M-Block Auditorium"
                required>
        </div>

        <div class="form-group">
            <label>Event Date</label>
            <input
                type="date"
                id="date"
                required>
        </div>

        <div class="form-group">
            <label>Event Time</label>
            <input
                type="text"
                id="time"
                placeholder="e.g. 5:00 PM"
                required>
        </div>

        <button type="submit">
            Publish Announcement
        </button>

        <div id="message"></div>

    </form>

</div>

<script src="announcementform.js"></script>

</body>
</html>
