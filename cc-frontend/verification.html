<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verification - Campus Connect</title>
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="setting.css">
    <style>
        .status-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border-radius: 18px;
            border: 1.5px solid var(--border);
            margin-bottom: 25px;
            background: var(--white);
            text-align: center;
        }
        .status-icon {
            font-size: 50px;
            margin-bottom: 12px;
        }
        .status-badge {
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 20px;
            margin-top: 8px;
            display: inline-block;
        }
        .status-unverified {
            color: #b40b0b;
            background-color: #fdeaea;
            border: 1px solid #b40b0b;
        }
        .status-pending {
            color: #a26b2d;
            background-color: #fef3c7;
            border: 1px solid #a26b2d;
        }
        .status-verified {
            color: #1b8843;
            background-color: #dcfce7;
            border: 1px solid #1b8843;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            text-align: left;
        }
        .form-label {
            font-weight: 700;
            color: var(--text);
            font-size: 15px;
        }
        .form-input {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
            width: 100%;
        }
        .form-input:focus {
            border-color: var(--teal-1);
            background: var(--bottom-line);
        }
        .file-upload-box {
            border: 2px dashed var(--border);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bottom-line);
            color: var(--text);
        }
        .file-upload-box:hover {
            border-color: var(--teal-1);
        }
        .btn-submit {
            width: 100%;
            background: var(--background);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(47, 126, 120, 0.15);
        }
        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 16px rgba(47, 126, 120, 0.25);
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <div class="settings-header">
            <h1 class="settings-title"><i class="fi fi-rr-badge-check"></i> Verification</h1>
            <a href="setthing.html" class="home-link">← Settings</a>
        </div>

        <div class="status-container" id="statusContainer">
            <div class="status-icon" id="statusIcon">🔒</div>
            <div style="font-weight: 700; font-size: 18px; color: var(--text);">Account Status</div>
            <div class="status-badge status-unverified" id="statusBadge">Checking...</div>
        </div>

        <!-- Student Verification Form -->
        <form id="verificationForm" style="display: none;">
            <div class="form-group">
                <label class="form-label">College Registration / Roll Number</label>
                <input type="text" class="form-input" id="rollNumber" placeholder="e.g. 0101CS221045" required>
            </div>

            <div class="form-group">
                <label class="form-label">College ID Card (Image/PDF)</label>
                <div class="file-upload-box" onclick="document.getElementById('fileInput').click()">
                    <i class="fi fi-rr-upload" style="font-size: 24px; display: block; margin-bottom: 6px; color: var(--teal-1);"></i>
                    <span id="fileLabel">Upload file or drag and drop here</span>
                    <input type="file" id="fileInput" style="display: none;" onchange="handleFile(this)">
                </div>
            </div>

            <button type="submit" class="btn-submit">Submit for Verification</button>
        </form>

        <!-- Club Verification Form -->
        <form id="clubVerificationForm" style="display: none;">
            <div class="form-group">
                <label class="form-label">Club Name</label>
                <input type="text" class="form-input" id="clubNameInput" placeholder="e.g. Robotics Club" required>
            </div>
            <div class="form-group">
                <label class="form-label">Club Head Name</label>
                <input type="text" class="form-input" id="clubHeadInput" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
                <label class="form-label">Founded Year</label>
                <input type="text" class="form-input" id="clubFoundedInput" placeholder="e.g. 2024" required>
            </div>
            <div class="form-group">
                <label class="form-label">Club Description</label>
                <textarea class="form-input" id="clubDescriptionInput" style="min-height: 80px; resize: vertical;" placeholder="Tell us about the club..." required></textarea>
            </div>
            <button type="submit" class="btn-submit">Submit Club for Verification</button>
        </form>

        <div id="verifiedMessage" style="display: none; padding: 15px; border-radius: 12px; background: #e6f6ed; border: 1.5px solid #1b8843; color: #1b8843; font-weight: 600; text-align: center;">
            🎉 Congratulations! Your student credentials have been verified. You now have full access to Campus Connect.
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        const userId = localStorage.getItem("userId");
        const token = localStorage.getItem("token");

        document.addEventListener("DOMContentLoaded", async () => {
            if (!userId) {
                window.location.href = "loginpage.html";
                return;
            }
            await checkVerificationStatus();
        });

        async function checkVerificationStatus() {
            try {
                // Fetch User Details
                const res = await fetch(`http://localhost:5000/api/profile/${userId}`, {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });
                
                if (res.ok) {
                    const user = await res.json();
                    const isClubEmail = user.email.toLowerCase().includes("club");

                    if (isClubEmail) {
                        // Club Verification Flow
                        document.getElementById("verificationForm").style.display = "none";
                        await checkClubVerificationStatus();
                    } else {
                        // Student Verification Flow
                        document.getElementById("clubVerificationForm").style.display = "none";
                        updateStatusUI(user.verificationStatus || "unverified", user.rollNumber);
                    }
                }
            } catch (err) {
                console.error("Error loading verification status:", err);
            }
        }

        async function checkClubVerificationStatus() {
            try {
                const res = await fetch("http://localhost:5000/api/clubs", {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (res.ok) {
                    const clubs = await res.json();
                    // Find a club created by or administered by this user
                    const myClub = clubs.find(c => c.createdBy === userId || (c.clubAdmin && c.clubAdmin === userId));
                    
                    updateClubStatusUI(myClub);
                }
            } catch (err) {
                console.error("Error checking club status:", err);
            }
        }

        function updateStatusUI(status, rollNumber) {
            const statusIcon = document.getElementById("statusIcon");
            const statusBadge = document.getElementById("statusBadge");
            const form = document.getElementById("verificationForm");
            const verifiedMessage = document.getElementById("verifiedMessage");

            statusBadge.className = "status-badge";
            
            if (status === "verified") {
                statusIcon.textContent = "✅";
                statusBadge.textContent = "Verified Student";
                statusBadge.classList.add("status-verified");
                form.style.display = "none";
                verifiedMessage.style.display = "block";
                verifiedMessage.style.background = "#e6f6ed";
                verifiedMessage.style.borderColor = "#1b8843";
                verifiedMessage.style.color = "#1b8843";
                if (rollNumber) {
                    verifiedMessage.innerHTML = `🎉 Congratulations! Your student credentials have been verified. You now have full access to Campus Connect.<div style="margin-top: 10px; font-size: 14px; opacity: 0.85;">Roll Number: ${rollNumber}</div>`;
                }
            } else if (status === "pending") {
                statusIcon.textContent = "⏳";
                statusBadge.textContent = "Pending Approval";
                statusBadge.classList.add("status-pending");
                form.style.display = "none";
                verifiedMessage.style.display = "block";
                verifiedMessage.style.background = "#fffbeb";
                verifiedMessage.style.borderColor = "#a26b2d";
                verifiedMessage.style.color = "#a26b2d";
                verifiedMessage.textContent = "⏳ Your verification request is pending. Our admin team is reviewing your college ID card.";
            } else {
                statusIcon.textContent = "❌";
                statusBadge.textContent = "Unverified Account";
                statusBadge.classList.add("status-unverified");
                form.style.display = "block";
                verifiedMessage.style.display = "none";
            }
        }

        function updateClubStatusUI(club) {
            const statusIcon = document.getElementById("statusIcon");
            const statusBadge = document.getElementById("statusBadge");
            const clubForm = document.getElementById("clubVerificationForm");
            const verifiedMessage = document.getElementById("verifiedMessage");

            statusBadge.className = "status-badge";

            if (club) {
                if (club.status === "approved") {
                    statusIcon.textContent = "✅";
                    statusBadge.textContent = "Verified Club Admin";
                    statusBadge.classList.add("status-verified");
                    clubForm.style.display = "none";
                    verifiedMessage.style.display = "block";
                    verifiedMessage.style.background = "#e6f6ed";
                    verifiedMessage.style.borderColor = "#1b8843";
                    verifiedMessage.style.color = "#1b8843";
                    verifiedMessage.innerHTML = `🎉 Congratulations! Your club <b>${club.clubName}</b> has been verified. You now have full admin privileges to publish announcements and edit details for this club.`;
                } else {
                    // Pending
                    statusIcon.textContent = "⏳";
                    statusBadge.textContent = "Pending Approval";
                    statusBadge.classList.add("status-pending");
                    clubForm.style.display = "none";
                    verifiedMessage.style.display = "block";
                    verifiedMessage.style.background = "#fffbeb";
                    verifiedMessage.style.borderColor = "#a26b2d";
                    verifiedMessage.style.color = "#a26b2d";
                    verifiedMessage.innerHTML = `⏳ Your club verification request for <b>${club.clubName}</b> is pending. Our admin team is reviewing your club details.`;
                }
            } else {
                // No club request yet
                statusIcon.textContent = "❌";
                statusBadge.textContent = "Unverified Club";
                statusBadge.classList.add("status-unverified");
                clubForm.style.display = "block";
                verifiedMessage.style.display = "none";
                
                // Pre-fill headName with user's name
                document.getElementById("clubHeadInput").value = localStorage.getItem("username") || "";
            }
        }

        function handleFile(input) {
            if (input.files && input.files[0]) {
                document.getElementById("fileLabel").textContent = `Selected: ${input.files[0].name}`;
            }
        }

        document.getElementById("verificationForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const rollNumber = document.getElementById("rollNumber").value.trim();
            
            try {
                const res = await fetch(`http://localhost:5000/api/profile/${userId}/verification`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ rollNumber })
                });

                if (res.ok) {
                    const data = await res.json();
                    alert(data.message || "Details submitted successfully!");
                    await checkVerificationStatus();
                } else {
                    const err = await res.json();
                    alert(err.error || "Submission failed.");
                }
            } catch (err) {
                console.error("Verification submit error:", err);
                alert("An error occurred. Make sure server is running.");
            }
        });

        document.getElementById("clubVerificationForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const payload = {
                clubName: document.getElementById("clubNameInput").value.trim(),
                headName: document.getElementById("clubHeadInput").value.trim(),
                foundedYear: document.getElementById("clubFoundedInput").value.trim(),
                description: document.getElementById("clubDescriptionInput").value.trim()
            };

            try {
                const res = await fetch("http://localhost:5000/api/clubs", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert("🎉 Club verification request submitted successfully!");
                    await checkVerificationStatus();
                } else {
                    const err = await res.json();
                    alert(err.error || "Failed to submit club request.");
                }
            } catch (err) {
                console.error("Club submit error:", err);
                alert("An error occurred. Make sure server is running.");
            }
        });
    </script>
</body>
</html>
