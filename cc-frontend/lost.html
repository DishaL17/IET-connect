          placeholder="Search for lost, rent, sell items…"
          oninput="searchItems()"
          onkeydown="if(event.key==='Enter') searchItems()">
      </div>
      <button onclick="searchItems()">Search</button>
    </div>
    <div class="user-chip">
      <div class="avatar"></div>
      <span class="username"></span>
    </div>
  </div>

  <!-- Search Dropdown -->
  <div class="search-drop" id="searchDrop" style="display:none">

  </div>

</header>
         
 <div class="nav-links">
    
    <a href="home.html" class="nav-link "><i class="fi fi-rr-home"></i> Home</a>
    <a href="post.html" class="nav-link"><i class="fi fi-rr-edit"></i> My Post</a>
    <a href="Announcment.html" class="nav-link"><i class="fi fi-rr-megaphone"></i> Announcements</a>
       <a href="notification.html" class="nav-link"><i class="fi fi-rr-comment-dots"></i> Messages </a>
        <a href="setthing.html" class="nav-link"><i class="fi fi-rr-settings"></i> Settings</a>
  </div>
  
 
    
    <div>
        <div class="pages">
        <button class="lpage" onclick="window.location.href='lost.html'">Lost items</button>
        <button class="fpage" onclick="window.location.href='found.html'">Found items</butthon>
        <button class="spage" onclick="window.location.href='sell.html'">For Sell</button>
        <button class="rpage" onclick="window.location.href='rent.html'">Rentals</button>
        </div>
    
       <div class="main"> <h1>Lost an item on campus or nearby?</h1>

       <div class="rep"><button class="btn" onclick="window.location.href='itemform.html?type=lost'">I Lost Something</button>
       </div></div> 
  
    <div class="look"><span class="act">Active Search </span>
        <span class="all" id="all">view all ➝</span></div>
    <div class="items" id="lostItems"></div>
    <div id="itemModal" class="modal">
  <div class="modal-content">

    <span class="close-btn" onclick="closeModal()">&times;</span>

    <img id="modalImage">
    <div class="modal-body">
      <h2 id="modalTitle"></h2>
      <p><strong>Category:</strong> <span id="modalCategory"></span></p>
      <p><strong>Location:</strong> <span id="modalLocation"></span></p>
      <p><strong>Price:</strong> <span id="modalPrice"></span></p>
      <p><strong>Description:</strong></p>
      <p id="modalDescription"></p>
      <button id="modalChatBtn" class="claim">
        I found it!
      </button>

    </div>
